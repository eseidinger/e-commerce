services:

  keycloak:
    hostname: keycloak
    image: quay.io/keycloak/keycloak:26.5.7-0
    command: start-dev --import-realm --http-port 8084
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HEALTH_ENABLED=true
    ports:
      - "8084:8084"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

  keycloak-health:
    image: nginx:1.29.7
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -s http://keycloak:8084/health | grep -q '\"status\": \"UP\"'" ]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    image: prom/prometheus:v3.11.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
  
  grafana:
    image: grafana/grafana-oss:12.4.2
    environment:
      - GF_PATHS_PROVISIONING=/var/lib/grafana/provisioning
      - GF_SERVER_HTTP_PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./grafana/provisioning:/var/lib/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  loki:
    image: grafana/loki:3.6.10
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.6.10
    user: "0:0"
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  jaeger:
    hostname: jaeger
    image: jaegertracing/all-in-one:1.76.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

networks:
  default:
    name: ecommerce-shared
    external: true
